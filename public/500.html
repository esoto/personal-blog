<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>500 - Internal Server Error</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', Menlo, Consolas, monospace;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 560px;
      width: 100%;
    }

    .error-code {
      font-size: clamp(4rem, 12vw, 7rem);
      font-weight: 700;
      color: #f85149;
      line-height: 1;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    .terminal-window {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      margin: 1.5rem 0;
      overflow: hidden;
    }

    .terminal-header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .terminal-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
    }

    .terminal-dot.red { background: #ff5f57; }
    .terminal-dot.yellow { background: #febc2e; }
    .terminal-dot.green { background: #28c840; }

    .terminal-body {
      padding: 1.25rem;
      text-align: left;
      font-size: 0.875rem;
      line-height: 1.7;
    }

    .prompt {
      color: #58a6ff;
    }

    .command {
      color: #e6edf3;
    }

    .output {
      color: #8b949e;
    }

    .error-text {
      color: #f85149;
    }

    .subtitle {
      color: #8b949e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 1rem;
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }

    .back-link {
      display: inline-block;
      color: #58a6ff;
      text-decoration: none;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 0.9375rem;
      padding: 0.625rem 1.5rem;
      border: 1px solid #30363d;
      border-radius: 6px;
      background: #161b22;
      transition: border-color 0.15s ease, background 0.15s ease;
    }

    .back-link:hover {
      border-color: #58a6ff;
      background: #1a2332;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">500</div>

    <div class="terminal-window">
      <div class="terminal-header">
        <span class="terminal-dot red"></span>
        <span class="terminal-dot yellow"></span>
        <span class="terminal-dot green"></span>
      </div>
      <div class="terminal-body">
        <div><span class="prompt">$</span> <span class="command">rails server</span></div>
        <div><span class="error-text">500 Internal Server Error</span></div>
        <div><span class="output">Something went wrong on our end.</span></div>
        <div><span class="output">We've been notified and are looking into it.</span></div>
      </div>
    </div>

    <p class="subtitle">An unexpected error occurred. Please try again later.</p>

    <a href="/" class="back-link">&larr; Back to home</a>
  </div>
</body>
</html>
