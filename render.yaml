databases:
  - name: personal-blog-db
    plan: free
    databaseName: personal_blog_production
    user: personal_blog

services:
  - type: web
    name: personal-blog
    runtime: docker
    plan: free
    healthCheckPath: /up
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: personal-blog-db
          property: connectionString
      - key: CACHE_DATABASE_URL
        fromDatabase:
          name: personal-blog-db
          property: connectionString
      - key: QUEUE_DATABASE_URL
        fromDatabase:
          name: personal-blog-db
          property: connectionString
      - key: CABLE_DATABASE_URL
        fromDatabase:
          name: personal-blog-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_LEVEL
        value: info
      - key: SOLID_QUEUE_IN_PUMA
        value: "true"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
