# Name of your application. Used to uniquely configure containers.
service: personal-blog

# Name of the container image.
image: esoto/personal-blog

# Deploy to these servers.
servers:
  web:
    - 178.104.88.183

# SSL via Let's Encrypt + kamal-proxy
proxy:
  ssl: true
  host: blog.estebansoto.dev

# GitHub Container Registry
registry:
  server: ghcr.io
  username: esoto
  password:
    - KAMAL_REGISTRY_PASSWORD

# Environment variables injected into containers
env:
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_URL
    - SECRET_KEY_BASE
    - BLOG_API_TOKEN
    - ADMIN_PASSWORD
    - ADMIN_EMAIL
  clear:
    RAILS_ENV: production
    SOLID_QUEUE_IN_PUMA: true

# PostgreSQL accessory
accessories:
  db:
    image: postgres:17
    host: 178.104.88.183
    port: "127.0.0.1:5432:5432"
    volumes:
      - "personal-blog-db-data:/var/lib/postgresql/data"
    env:
      clear:
        POSTGRES_USER: blog
        POSTGRES_DB: personal_blog_production
      secret:
        - POSTGRES_PASSWORD

  backups:
    image: prodrigestivill/postgres-backup-local
    host: 178.104.88.183
    volumes:
      - "personal-blog-backups:/backups"
    env:
      clear:
        POSTGRES_HOST: personal-blog-db
        POSTGRES_DB: personal_blog_production
        POSTGRES_USER: blog
        SCHEDULE: "@daily"
        BACKUP_KEEP_DAYS: "30"
      secret:
        - POSTGRES_PASSWORD

# Persistent storage for Active Storage and Solid Queue/Cache/Cable
volumes:
  - "personal-blog-storage:/rails/storage"

# Bridge assets between versions
asset_path: /rails/public/assets

# SSH as deploy user (root disabled)
ssh:
  user: deploy

# Build for amd64 (Hetzner server architecture)
builder:
  arch: amd64

# Useful aliases
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"
