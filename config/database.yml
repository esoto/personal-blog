# PostgreSQL configuration for all environments.
#   gem "pg"
#
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: personal_blog_development

test:
  <<: *default
  database: personal_blog_test

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
